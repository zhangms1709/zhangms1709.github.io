name: Site checks

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-mail --accept 200,206,429 './**/*.html'
          fail: true

  html-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Validate HTML
        run: npx --yes html-validate './**/*.html'

  css-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install Tailwind
        run: npm install --no-audit --no-fund
      - name: Build CSS
        run: npm run build:css
      - name: Fail if committed output.css is stale
        run: |
          if ! git diff --quiet -- styles/output.css; then
            echo "::error::styles/output.css is out of date — run \`npm run build:css\` and commit the result."
            git --no-pager diff -- styles/output.css | head -40
            exit 1
          fi

  case-sensitive-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify local refs resolve with exact case (GitHub Pages is case-sensitive)
        run: python scripts/check_paths.py
      - name: Verify HTML structural sanity
        run: python scripts/check_html.py
