<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#34ade6">
    <title>Slider | Mason Zhang</title>
    <meta name="description" content="Manual photo slideshow.">
    <link rel="canonical" href="https://zhangms1709.github.io/slider/">
    <meta property="og:title" content="Slider">
    <meta property="og:description" content="Manual photo slideshow.">
    <meta property="og:url" content="https://zhangms1709.github.io/slider/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://zhangms1709.github.io/images/IMG_4988Large.jpeg">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="/styles/slider.css">
    <script src="/slider/slider.js" defer></script>
</head>

<body>
    <h1 class="visually-hidden">Photo slideshow</h1>
    <main class="slideshow-container" aria-label="Photo slideshow">
        <div class="mySlides fade">
            <div class="numbertext">1 / 3</div>
            <img loading="lazy" decoding="async" src="/images/IMG_4988Large.jpeg" alt="Slide 1">
            <div class="text">Caption Text</div>
        </div>

        <div class="mySlides fade">
            <div class="numbertext">2 / 3</div>
            <img loading="lazy" decoding="async" src="/images/IMG_5179Large.jpeg" alt="Slide 2">
            <div class="text">Caption Two</div>
        </div>

        <div class="mySlides fade">
            <div class="numbertext">3 / 3</div>
            <img loading="lazy" decoding="async" src="/images/IMG_5278Large.jpeg" alt="Slide 3">
            <div class="text">Caption Three</div>
        </div>

        <button type="button" class="prev" aria-label="Previous slide" onclick="plusSlides(-1)">&#10094;</button>
        <button type="button" class="next" aria-label="Next slide" onclick="plusSlides(1)">&#10095;</button>
    </main>

    <div class="dots" aria-hidden="true">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
    </div>
</body>

</html>
